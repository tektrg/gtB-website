name: AUTONOMUS Daily Publish

on:
  schedule:
    # Twice daily:
    # - 01:00 Asia/Saigon (UTC+7) = 18:00 UTC (prev day)
    # - 13:00 Asia/Saigon (UTC+7) = 06:00 UTC
    - cron: "0 18 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autonomus-daily-publish
  cancel-in-progress: false

jobs:
  generate_blog:
    name: Generate daily blog post (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Generate blog post (Asia/Saigon date)
        run: |
          DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
          node AUTONOMUS/tools/publish-daily-post.mjs --date "$DATE"

      - name: Create patch artifact
        run: |
          git add -A
          : > blog.patch
          if [ -n "$(git diff --cached --name-only)" ]; then
            git diff --cached --binary > blog.patch
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: blog-patch
          path: blog.patch

  generate_provider:
    name: Generate daily provider guide (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Generate provider guide (Asia/Saigon date)
        run: |
          DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
          node AUTONOMUS/tools/publish-provider-guide.mjs --date "$DATE"

      - name: Create patch artifact
        run: |
          git add -A
          : > provider.patch
          if [ -n "$(git diff --cached --name-only)" ]; then
            git diff --cached --binary > provider.patch
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: provider-patch
          path: provider.patch

  generate_model_pricing:
    name: Generate model pricing post (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Generate model pricing post (Asia/Saigon date)
        run: |
          DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
          node AUTONOMUS/tools/publish-model-pricing-guide.mjs --date "$DATE"

      - name: Create patch artifact
        run: |
          git add -A
          : > model-pricing.patch
          if [ -n "$(git diff --cached --name-only)" ]; then
            git diff --cached --binary > model-pricing.patch
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: model-pricing-patch
          path: model-pricing.patch

  merge_and_ship:
    name: Merge + verify + ship (main)
    runs-on: ubuntu-latest
    needs: [generate_blog, generate_provider, generate_model_pricing]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: blog-patch
          path: .autonomus_artifacts

      - uses: actions/download-artifact@v4
        with:
          name: provider-patch
          path: .autonomus_artifacts

      - uses: actions/download-artifact@v4
        with:
          name: model-pricing-patch
          path: .autonomus_artifacts

      - name: Apply patches
        run: |
          ls -la .autonomus_artifacts
          if [ -s .autonomus_artifacts/blog.patch ]; then
            git apply --binary .autonomus_artifacts/blog.patch
          fi
          if [ -s .autonomus_artifacts/provider.patch ]; then
            git apply --binary .autonomus_artifacts/provider.patch
          fi
          if [ -s .autonomus_artifacts/model-pricing.patch ]; then
            git apply --binary .autonomus_artifacts/model-pricing.patch
          fi

      - name: Refresh 1 blog post (when daily blog publish was skipped)
        run: |
          BLOG_CHANGED=$(git status --porcelain | awk '{print $2}' | grep '^src/content/blog/' | wc -l | tr -d ' ')
          if [ "$BLOG_CHANGED" = "0" ]; then
            DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
            node AUTONOMUS/tools/refresh-blog-money-links.mjs --date "$DATE" || true
          else
            echo "Blog already changed in this run; skipping refresh."
          fi

      - name: Run baseline verifiers + internal link chores
        run: |
          node AUTONOMUS/scripts/verify_site_basics.mjs
          node AUTONOMUS/scripts/add_continue_reading.mjs || true
          node AUTONOMUS/scripts/check_internal_links.mjs

      - name: SEO hygiene gates
        run: |
          npm run -s seo:verify
          npm run -s check

      - name: Update daily report
        run: |
          DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
          REPORT="AUTONOMUS/reports/${DATE}.md"
          mkdir -p AUTONOMUS/reports

          # Determine whether blog/provider generated anything in this run.
          BLOG_CHANGED=$(git status --porcelain | awk '{print $2}' | grep '^src/content/blog/' | wc -l | tr -d ' ')
          PROVIDER_CHANGED=$(git status --porcelain | awk '{print $2}' | grep '^src/content/guide/providers/' | wc -l | tr -d ' ')

          BLOG_SKIP_REASON="skipped (missing/incomplete research or no available topic)"
          MODEL_PRICING_SKIP_REASON="skipped (no eligible model pricing page)"
          PROVIDER_SKIP_REASON="none"

          # Build a detailed shipped section with counts + links for each changed item.
          DETAILS_FILE=$(mktemp)
          node AUTONOMUS/tools/report-run-details.mjs \
            --site "https://gptbreeze.io" \
            --blog-skip-reason "$BLOG_SKIP_REASON" \
            --model-pricing-skip-reason "$MODEL_PRICING_SKIP_REASON" \
            --provider-skip-reason "$PROVIDER_SKIP_REASON" \
            > "$DETAILS_FILE"

          # Normalize legacy report headers so the file is just an append-only log of runs.
          # Desired structure:
          #   # AUTONOMUS Daily Report — YYYY-MM-DD
          #
          #   ---
          #   ## Run @ HH:MM
          #   **Shipped:** ...
          #   **Why:** ...
          #   **Checks:** ...
          #   **Next:** ...
          if [ -f "$REPORT" ]; then
            if grep -q '^---$' "$REPORT"; then
              TMP_REPORT=$(mktemp)
              echo "# AUTONOMUS Daily Report — ${DATE}" > "$TMP_REPORT"
              echo "" >> "$TMP_REPORT"
              awk 'BEGIN{p=0} /^---$/{p=1} p{print}' "$REPORT" >> "$TMP_REPORT"
              mv "$TMP_REPORT" "$REPORT"
            else
              # Old format without run blocks: rewrite header only; we will append the run below.
              cat > "$REPORT" <<EOF
          # AUTONOMUS Daily Report — ${DATE}

          EOF
            fi
          fi

          if [ ! -f "$REPORT" ]; then
            cat > "$REPORT" <<EOF
          # AUTONOMUS Daily Report — ${DATE}

          EOF
          fi

          cat >> "$REPORT" <<EOF

          ---

          ## Run @ $(TZ=Asia/Ho_Chi_Minh date '+%H:%M')
          EOF
          cat "$DETAILS_FILE" >> "$REPORT"
          cat >> "$REPORT" <<EOF

          **Checks:**
          - seo:verify ✅
          - check ✅

          **Next:**
          - Review Search Console queries: pick 1 new topic + 1 internal-link upgrade.
          EOF

          rm -f "$DETAILS_FILE"

      - name: Commit and push (main)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "autonomus-bot"
          git config user.email "autonomus-bot@users.noreply.github.com"

          git add -A
          DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)
          git commit -m "AUTONOMUS: daily publish ${DATE}"
          git push origin main
